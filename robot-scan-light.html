<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI智能客户分析 - 浅色模式</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    
    * {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    
    /* 扫描动画 */
    @keyframes scan-pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }
    
    @keyframes progress-fill {
      from { width: 0%; }
    }
    
    @keyframes fade-slide-in {
      from { 
        opacity: 0; 
        transform: translateX(20px); 
      }
      to { 
        opacity: 1; 
        transform: translateX(0); 
      }
    }
    
    @keyframes typing-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    
    .scan-pulse {
      animation: scan-pulse 2s ease-in-out infinite;
    }
    
    .fade-slide-in {
      animation: fade-slide-in 0.4s ease-out forwards;
    }
    
    .typing-dot {
      animation: typing-bounce 0.6s ease-in-out infinite;
    }
    
    .typing-dot:nth-child(2) {
      animation-delay: 0.15s;
    }
    
    .typing-dot:nth-child(3) {
      animation-delay: 0.3s;
    }
    
    /* 自定义滚动条 */
    ::-webkit-scrollbar {
      width: 4px;
    }
    
    ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }
    
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 2px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
    
    /* 玻璃拟态效果 */
    .glass-panel {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    
    /* 渐变边框 */
    .gradient-border {
      position: relative;
    }
    
    .gradient-border::before {
      content: '';
      position: absolute;
      inset: 0;
      padding: 1px;
      border-radius: inherit;
      background: linear-gradient(135deg, #0ea5e9, #06b6d4);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-white to-sky-50 min-h-screen flex items-center justify-center p-6">
  
  <!-- 主容器 -->
  <div class="w-full max-w-[1200px] bg-white rounded-2xl shadow-[0_8px_40px_-12px_rgba(0,0,0,0.1)] border border-slate-200 overflow-hidden">
    
    <!-- 顶部 Header -->
    <div class="bg-gradient-to-r from-sky-500 to-cyan-500 px-6 py-4 flex items-center justify-between">
      <!-- Logo & Title -->
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center backdrop-blur-sm">
          <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
          </svg>
        </div>
        <div>
          <h1 class="text-white font-bold text-lg tracking-wide">客户360智能分析系统</h1>
          <p class="text-sky-100 text-xs">CUSTOMER INTELLIGENCE PLATFORM V2.0</p>
        </div>
      </div>
      
      <!-- 系统信息 -->
      <div class="flex items-center gap-6">
        <div class="text-right">
          <p class="text-sky-100 text-xs">系统日期</p>
          <p class="text-white font-mono text-sm">2026-04-02</p>
        </div>
        <div class="h-8 w-px bg-white/20"></div>
        <div class="flex items-center gap-2">
          <div class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></div>
          <span class="text-white text-sm font-medium">系统正常</span>
        </div>
      </div>
    </div>
    
    <!-- 主体内容区 -->
    <div class="flex h-[520px]">
      
      <!-- 左侧步骤导航 -->
      <div class="w-[280px] bg-slate-50 border-r border-slate-200 p-5 flex flex-col">
        
        <!-- 步骤列表 -->
        <div id="step-list" class="flex-1 space-y-1">
          <!-- 动态生成 -->
        </div>
        
        <!-- 扫描状态 -->
        <div class="mt-4 pt-4 border-t border-slate-200">
          <p class="text-slate-400 text-xs mb-1">扫描状态</p>
          <div id="scan-status" class="flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-sky-500 animate-pulse"></div>
            <span class="text-sky-600 font-medium text-sm">正在分析...</span>
          </div>
        </div>
        
        <!-- 开始分析按钮 -->
        <button 
          id="start-btn"
          onclick="startAnalysis()"
          class="mt-4 w-full py-3 px-4 bg-gradient-to-r from-sky-500 to-cyan-500 hover:from-sky-600 hover:to-cyan-600 text-white rounded-xl font-medium text-sm flex items-center justify-center gap-2 transition-all duration-300 shadow-lg shadow-sky-500/25 hover:shadow-sky-500/40"
        >
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          开始分析
        </button>
      </div>
      
      <!-- 右侧内容展示区 -->
      <div class="flex-1 bg-white p-6 overflow-auto">
        
        <!-- 当前步骤标题 -->
        <div id="content-header" class="flex items-center justify-between mb-6">
          <!-- 动态生成 -->
        </div>
        
        <!-- 内容区域 -->
        <div id="content-body" class="space-y-4">
          <!-- 动态生成 -->
        </div>
        
      </div>
    </div>
    
    <!-- 底部状态栏 -->
    <div class="bg-slate-50 border-t border-slate-200 px-6 py-2 flex items-center justify-between text-xs">
      <div class="flex items-center gap-4 text-slate-500">
        <span>网络延迟: <span class="text-emerald-500 font-mono">12ms</span></span>
        <span>CPU负载: <span class="text-sky-500 font-mono">14%</span></span>
        <span>内存使用: <span class="text-sky-500 font-mono">2.3GB</span></span>
      </div>
      <div class="text-slate-400">
        用户: ADMIN_774 | 工作站: DX-NEXUS-01
      </div>
    </div>
  </div>

  <script>
    // 步骤数据
    const steps = [
      {
        id: 1,
        code: 'STEP 01',
        title: '客户基本信息',
        icon: `<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>`,
        logs: [
          '建立数据库加密连接 ...',
          '解析客户核心身份 ID: CID-20260402-8849',
          '正在拉取个人资料详情 ...'
        ],
        data: {
          '姓名': '张建国',
          '会员等级': '铂金会员 (Lv.5)',
          '入行时长': '1284 天',
          '归属分支': '陆家嘴金融中心旗舰店'
        }
      },
      {
        id: 2,
        code: 'STEP 02',
        title: '账户与交易',
        icon: `<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" /></svg>`,
        logs: [
          '扫描活跃账户分布（储蓄/理财/信贷）...',
          '分析过去24个月交易频率 ...',
          '正在计算平均每日余额（AUM）...'
        ],
        data: {
          '账户总数': '5 个',
          '累计交易': '1,249 笔',
          '当前 AUM': '¥2,450,000.00',
          '风险承受能力': '稳健型 (C3)'
        }
      },
      {
        id: 3,
        code: 'STEP 03',
        title: '服务触点',
        icon: `<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" /></svg>`,
        logs: [
          '追踪跨渠道交互轨迹（App/柜台/客服）...',
          '评估数字化偏好程度 ...',
          '检测最近一次服务反馈 ...'
        ],
        data: {
          '偏好渠道': '手机银行 App (85%)',
          '活跃时间': '19:00 - 22:00',
          '满意度均值': '4.9 / 5.0',
          '投诉记录': '0 次'
        }
      },
      {
        id: 4,
        code: 'STEP 04',
        title: '客户标签',
        icon: `<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z" /></svg>`,
        logs: [
          '识别客户生命周期阶段 ...',
          '计算投资行为特征向量 ...',
          '匹配相似客户群体画像 ...'
        ],
        data: {
          '生命周期': '成熟期客户',
          '投资风格': '稳健增值型',
          '活跃标签': '高频交易、定投偏好',
          '价值分层': '高价值客户 (Top 5%)'
        }
      },
      {
        id: 5,
        code: 'STEP 05',
        title: '服务策略',
        icon: `<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>`,
        logs: [
          '生成个性化产品推荐列表 ...',
          '计算最优触达时机窗口 ...',
          '构建服务话术建议库 ...'
        ],
        data: {
          '推荐产品': '3款基金、2款理财',
          '触达时机': '本周五 20:00',
          '服务方式': '专属顾问一对一',
          '预期转化': '32%'
        }
      }
    ];

    let currentStep = -1;
    let isAnalyzing = false;
    let completedSteps = new Set();

    // 渲染步骤列表
    function renderStepList() {
      const container = document.getElementById('step-list');
      container.innerHTML = '';
      
      steps.forEach((step, index) => {
        const isActive = index === currentStep;
        const isCompleted = completedSteps.has(index);
        const isPending = index > currentStep;
        
        const stepEl = document.createElement('div');
        stepEl.className = `group relative p-3 rounded-xl cursor-pointer transition-all duration-300 ${
          isActive 
            ? 'bg-white shadow-md border border-sky-200' 
            : isCompleted
            ? 'bg-sky-50/50 border border-sky-100'
            : 'hover:bg-slate-100'
        }`;
        
        stepEl.onclick = () => {
          if (!isAnalyzing || isCompleted) {
            currentStep = index;
            renderStepList();
            renderContent();
          }
        };
        
        // 进度条宽度
        const progressWidth = isCompleted ? '100%' : isActive ? '60%' : '0%';
        
        stepEl.innerHTML = `
          <div class="flex items-center gap-3">
            <!-- 序号/图标 -->
            <div class="w-8 h-8 rounded-lg flex items-center justify-center transition-colors ${
              isActive 
                ? 'bg-gradient-to-br from-sky-500 to-cyan-500 text-white' 
                : isCompleted
                ? 'bg-emerald-100 text-emerald-600'
                : 'bg-slate-200 text-slate-500'
            }">
              ${isCompleted && !isActive 
                ? '<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>'
                : step.icon
              }
            </div>
            
            <!-- 标题 -->
            <div class="flex-1">
              <div class="flex items-center justify-between">
                <span class="text-xs text-slate-400 font-mono">${step.code}</span>
                ${isCompleted 
                  ? '<span class="text-[10px] px-1.5 py-0.5 bg-emerald-100 text-emerald-600 rounded-full">完成</span>' 
                  : ''
                }
              </div>
              <p class="text-sm font-medium ${isActive ? 'text-sky-700' : isCompleted ? 'text-slate-700' : 'text-slate-500'}">${step.title}</p>
            </div>
          </div>
          
          <!-- 进度条 -->
          <div class="mt-2 h-1 bg-slate-200 rounded-full overflow-hidden">
            <div class="h-full rounded-full transition-all duration-500 ${
              isCompleted 
                ? 'bg-gradient-to-r from-emerald-400 to-emerald-500' 
                : isActive 
                ? 'bg-gradient-to-r from-sky-400 to-cyan-400'
                : 'bg-slate-300'
            }" style="width: ${progressWidth}"></div>
          </div>
        `;
        
        container.appendChild(stepEl);
      });
    }

    // 渲染内容区
    function renderContent() {
      const header = document.getElementById('content-header');
      const body = document.getElementById('content-body');
      
      if (currentStep < 0 || currentStep >= steps.length) {
        header.innerHTML = '';
        body.innerHTML = `
          <div class="h-full flex flex-col items-center justify-center text-slate-400">
            <div class="w-16 h-16 bg-slate-100 rounded-2xl flex items-center justify-center mb-4">
              <svg class="w-8 h-8 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
              </svg>
            </div>
            <p class="text-sm">点击左侧"开始分析"启动客户画像扫描</p>
          </div>
        `;
        return;
      }
      
      const step = steps[currentStep];
      
      // 渲染标题
      header.innerHTML = `
        <div class="flex items-center gap-3">
          <span class="px-2 py-1 bg-sky-100 text-sky-600 text-xs font-mono rounded">${step.code}</span>
          <h2 class="text-xl font-bold text-slate-800">${step.title}</h2>
        </div>
        ${completedSteps.has(currentStep) 
          ? '<span class="px-3 py-1 bg-emerald-100 text-emerald-600 text-xs font-medium rounded-full">完成</span>'
          : isAnalyzing && currentStep === getCurrentAnalyzingStep()
            ? '<div class="flex items-center gap-2"><div class="flex gap-0.5"><div class="w-1.5 h-1.5 rounded-full bg-sky-400 typing-dot"></div><div class="w-1.5 h-1.5 rounded-full bg-sky-400 typing-dot"></div><div class="w-1.5 h-1.5 rounded-full bg-sky-400 typing-dot"></div></div><span class="text-sky-500 text-xs">分析中...</span></div>'
            : ''
        }
      `;
      
      // 渲染内容
      body.innerHTML = `
        <!-- 分析日志 -->
        <div class="bg-slate-50 rounded-xl p-4 border border-slate-200">
          <p class="text-xs text-slate-400 mb-3 font-mono">分析日志</p>
          <div class="space-y-2">
            ${step.logs.map((log, idx) => `
              <div class="flex items-start gap-2 text-sm ${completedSteps.has(currentStep) || (isAnalyzing && idx < getCurrentLogIndex()) ? 'text-slate-600' : 'text-slate-400'}">
                <span class="text-sky-500 mt-0.5">›</span>
                <span>${log}</span>
              </div>
            `).join('')}
          </div>
        </div>
        
        <!-- 数据卡片 -->
        <div class="glass-panel rounded-xl p-4 border border-slate-200 gradient-border">
          <p class="text-xs text-slate-400 mb-3 font-mono">分析结果</p>
          <div class="grid grid-cols-2 gap-3">
            ${Object.entries(step.data).map(([key, value]) => `
              <div class="bg-white rounded-lg p-3 border border-slate-100">
                <p class="text-xs text-slate-400 mb-1">${key}</p>
                <p class="text-sm font-semibold text-slate-700">${value}</p>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    // 获取当前分析的步骤
    function getCurrentAnalyzingStep() {
      for (let i = 0; i < steps.length; i++) {
        if (!completedSteps.has(i)) return i;
      }
      return -1;
    }

    // 获取当前日志索引（模拟）
    function getCurrentLogIndex() {
      return 3; // 全部显示
    }

    // 开始分析
    async function startAnalysis() {
      if (isAnalyzing) return;
      
      isAnalyzing = true;
      completedSteps.clear();
      currentStep = 0;
      
      // 更新按钮状态
      const btn = document.getElementById('start-btn');
      btn.innerHTML = `
        <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
        分析中...
      `;
      btn.classList.add('opacity-75', 'cursor-not-allowed');
      
      // 更新扫描状态
      document.getElementById('scan-status').innerHTML = `
        <div class="w-2 h-2 rounded-full bg-sky-500 animate-pulse"></div>
        <span class="text-sky-600 font-medium text-sm">正在分析...</span>
      `;
      
      // 逐个步骤分析
      for (let i = 0; i < steps.length; i++) {
        currentStep = i;
        renderStepList();
        renderContent();
        
        // 模拟分析时间
        await sleep(2000);
        
        completedSteps.add(i);
        renderStepList();
        renderContent();
        
        if (i < steps.length - 1) {
          await sleep(500);
        }
      }
      
      // 分析完成
      isAnalyzing = false;
      document.getElementById('scan-status').innerHTML = `
        <div class="w-2 h-2 rounded-full bg-emerald-500"></div>
        <span class="text-emerald-600 font-medium text-sm">分析完成</span>
      `;
      
      btn.innerHTML = `
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
        重新分析
      `;
      btn.classList.remove('opacity-75', 'cursor-not-allowed');
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    // 监听父窗口消息
    window.addEventListener('message', (event) => {
      if (event.data === 'START_ANALYSIS') {
        startAnalysis();
      }
    });

    // 分析完成后通知父窗口
    const originalStartAnalysis = startAnalysis;
    window.startAnalysis = async function() {
      await originalStartAnalysis();
      // 分析完成后发送消息给父窗口
      if (window.parent !== window) {
        window.parent.postMessage('SCAN_COMPLETED', '*');
      }
    };

    // 初始化
    renderStepList();
    renderContent();
  </script>
</body>
</html>
